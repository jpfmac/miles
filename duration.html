<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audit Duration Calculator</title>
    <style>
        :root {
            --primary: ##ffffff;
            --bg: #008080;
            --card: #b2d8d8;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;

        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-bottom: 1.5rem; font-weight: 600; }
		h3 { margin-bottom: 1.5rem; font-weight: 800; color:#000000;}

        .time-section {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 1.0rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        input[type="time"] {
            font-size: 2rem;
            font-weight: bold;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            color: var(--primary);
            text-align: center;
            outline: none;
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 5px;
        }

        .btn-adj {
            background: #e2e8f0;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-adj:hover { background: #cbd5e1; }

        .result-box {
            margin-top: 1.0rem;
            padding: 1.0rem;
            background: #004c4c;
            border-radius: 12px;
            border: 1px solid #dbeafe;
        }

        #duration-text {
            font-size: 1.0rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }
		#durationHead-text {
            font-size: 1.10rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="time-section">
        <label>
			<h3>Start Time</h3>
		</label>
        <input type="time" id="startTime" value="06:00" oninput="calculate()">
		<!-- buttons to add and reduce time in 15min
			<div class="controls">
            <button class="btn-adj" onclick="adjustTime(-15)">-15m</button>
            <button class="btn-adj" onclick="adjustTime(15)">+15m</button>
        </div>-->
    </div>

    <div class="time-section">
        <label>
			<h3>End Time</h3>
		</label>
        <input type="time" id="endTime" oninput="calculate()">
    </div>

    <hr style="border: 0; border-top: 1px solid #eee; margin-top: 1.5rem;">

    <div class="result-box">
        <label id="durationHead-text">Duration</label>
        <p id="duration-text">0h 0</p>
    </div>
</div>

<script>
    // 1. Set End Time to "Now" on load
    window.onload = function() {
        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        document.getElementById('endTime').value = `${hours}:${minutes}`;
        calculate();
    };

    // 2. Function to adjust Start Time with buttons
    function adjustTime(minutesToAdd) {
        const startInput = document.getElementById('startTime');
        let [hrs, mins] = startInput.value.split(':').map(Number);
        
        let date = new Date();
        date.setHours(hrs);
        date.setMinutes(mins + minutesToAdd);

        const newHrs = String(date.getHours()).padStart(2, '0');
        const newMins = String(date.getMinutes()).padStart(2, '0');
        
        startInput.value = `${newHrs}:${newMins}`;
        calculate();
    }

    // 3. The Calculation Logic
    function calculate() {
        const start = document.getElementById('startTime').value;
        const end = document.getElementById('endTime').value;

        if (!start || !end) return;

        let [sH, sM] = start.split(':').map(Number);
        let [eH, eM] = end.split(':').map(Number);

        let startInMinutes = sH * 60 + sM;
        let endInMinutes = eH * 60 + eM;

        if (endInMinutes < startInMinutes) {
            endInMinutes += 24 * 60;
        }

        let diff = endInMinutes - startInMinutes;
        let h = Math.floor(diff / 60);
        let m = diff % 60;

        document.getElementById('duration-text').innerText = `${h}h ${m}m`;
    }
</script>

</body>
</html>
