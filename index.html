
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trips Tracker</title>
    <style>
        :root {
            --primary: ##ffffff;
            --bg: #008080;
            --card: #b2d8d8;
            --text: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;

        }

        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 { margin-bottom: 1.5rem; font-weight: 600; }
		h3 { margin-bottom: 1.5rem; font-weight: 800; color:#000000;}

        .time-section {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 1.0rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        input[type="time"] {
            font-size: 2rem;
            font-weight: bold;
            padding: 10px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            color: var(--primary);
            text-align: center;
            outline: none;
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 3px;
            margin-top: 5px;
        }

        .btn-adj {
            background: #e2e8f0;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-adj:hover { background: #cbd5e1; }

        .result-box {
            margin-top: 1.0rem;
            padding: 1.0rem;
            background: #004c4c;
            border-radius: 12px;
            border: 1px solid #dbeafe;
        }

        #duration-text {
            font-size: 1.0rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }
		#durationHead-text {
            font-size: 1.10rem;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="time-section">
        <label>
			<a href="miles.html"><h2>Miles Tracker</h2></a>
			<a href="duration.html"><h2>Duration Tracker</h2></a>
		</label>
    </div>
</div>

</body>
</html>
